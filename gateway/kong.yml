_format_version: "3.0"

services:
  - name: ingestion-service
    url: http://ingestion-service:8001
    routes:
      - name: ingestion-route
        paths: ["/api/v1/ingest"]
        strip_path: false

  - name: ai-layer-service
    url: http://ai-layer-service:8002
    routes:
      - name: ai-route
        paths: ["/api/v1/ai"]
        strip_path: false

  - name: oceanographic-service
    url: http://oceanographic-service:8003
    routes:
      - name: ocean-route
        paths: ["/api/v1/oceanography"]
        strip_path: false

  - name: fisheries-service
    url: http://fisheries-service:8004
    routes:
      - name: fisheries-route
        paths: ["/api/v1/fisheries"]
        strip_path: false

  - name: taxonomy-service
    url: http://taxonomy-service:8005
    routes:
      - name: taxonomy-route
        paths: ["/api/v1/taxonomy"]
        strip_path: false

  - name: molecular-service
    url: http://molecular-service:8006
    routes:
      - name: molecular-route
        paths: ["/api/v1/molecular"]
        strip_path: false

  - name: analytics-service
    url: http://analytics-service:8007
    routes:
      - name: analytics-route
        paths: ["/api/v1/analytics"]
        strip_path: false

plugins:
  - name: rate-limiting
    config:
      minute: 1000
      policy: local

  - name: cors
    config:
      origins: ["http://localhost:3000"]
      methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      headers: ["Authorization", "Content-Type"]
      exposed_headers: ["X-Auth-Token"]
      max_age: 3600
